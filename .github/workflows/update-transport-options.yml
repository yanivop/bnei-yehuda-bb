name: Update Transport Options

on:
  schedule:
    # Every Monday at 05:00 Israel time (IDT = UTC+3 → 02:00 UTC)
    - cron: "0 2 * * 1"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch form options and update generateReport.js
        run: node updateTransportOptions.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generateReport.js
          if git diff --cached --quiet; then
            echo "No changes to transport options — skipping commit"
          else
            git commit -m "chore: update transport form options $(date -u +'%Y-%m-%d')"
            git push
          fi
