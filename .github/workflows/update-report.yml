name: Update Match Report

on:
  schedule:
    # Runs every day at 06:00 Israel time (03:00 UTC)
    - cron: "0 3 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to push report.html back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate report
        run: node generateReport.js index.html

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to report.html — skipping commit"
          else
            git commit -m "chore: update match report $(date -u +'%Y-%m-%d')"
            git push
          fi
